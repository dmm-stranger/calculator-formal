<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="./files/logo-icon.png">
  <link rel="stylesheet" href="./css/style.css">
  <title>Formal Calculator</title>
</head>

<body>
  <main class="body-parent">
    <main class="calc-parent">
      <section class="calc-child1">
        <p>Calculator</p>
      </section>

      <section class="calc-child2">
        <section class="calc-child2-sub1">
          <!-- calculator accept only js form 16 digits -->
          <input class="input" id="display" type="text" value="">
          <span class="cut">&#8592;</span>
        </section>
        <section class="calc-child2-sub2">
          <button class="calc-btn">1</button>
          <button class="calc-btn">2</button>
          <button class="calc-btn">3</button>
          <button class="calc-btn colorful"><span>&#247;</span></button>
          <button class="calc-btn colorful" id="clear">AC</button>
          <button class="calc-btn">4</button>
          <button class="calc-btn">5</button>
          <button class="calc-btn">6</button>
          <button class="calc-btn colorful"><span>&#215;</span></button>
          <button class="calc-btn colorful"><img width="22" src="./files/save.svg" alt="save-icon-svg"></button>
          <button class="calc-btn">7</button>
          <button class="calc-btn">8</button>
          <button class="calc-btn">9</button>
          <button class="calc-btn colorful"><span>&#8722;</span></button>
          <button class="calc-btn many colorful" id="equals"><span>&#61;</span></button>
          <button class="calc-btn"><span>&#177;</span></button>
          <button class="calc-btn">0</button>
          <button class="calc-btn"><span>&#8729;</span></button>
          <button class="calc-btn colorful"><span>&#43;</span></button>
        </section>
      </section>

      <aside class="calc-child3">
        <p>1255.33</p>
      </aside>
    </main>
  </main>

  <script src="./js/script.js"></script>
</body>

</html>
