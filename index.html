<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="./files/logo-icon.png">
  <link rel="stylesheet" href="./css/style.css">
  <title>Formal Calculator</title>
</head>

<body>
  <main class="body-parent">
    <main class="calc-parent">
      <section class="calc-child1">
        <p>Calculator</p>
      </section>

      <section class="calc-child2">
        <section class="calc-child2-sub1">
          <!-- calculator accept only js form 16 digits -->
          <input class="input" id="display" type="text" value="0">
          <span class="cut"><button id="backslash" value='backslash'>&#8592;</button></span>
        </section>
        <section class="calc-child2-sub2">
          <button class="calc-btn" value='1'>1</button>
          <button class="calc-btn" value='2'>2</button>
          <button class="calc-btn" value='3'>3</button>
          <button class="calc-btn colorful" value='&#247;'><span>&#247;</span></button>
          <button class="calc-btn colorful" id="clear" value="clear">AC</button>
          <button class="calc-btn" value='4'>4</button>
          <button class="calc-btn" value='5'>5</button>
          <button class="calc-btn" value='6'>6</button>
          <button class="calc-btn colorful" value="&#215;"><span>&#215;</span></button>
          <button class="calc-btn colorful" value='save'><img width="22" src="./files/save.svg"
              alt="save-icon-svg"></button>
          <button class="calc-btn" value='7'>7</button>
          <button class="calc-btn" value='8'>8</button>
          <button class="calc-btn" value='9'>9</button>
          <button class="calc-btn colorful" value='&#8722;'><span>&#8722;</span></button>
          <button class="calc-btn many colorful" id="equals" value='&#61;'><span>&#61;</span></button>
          <button class="calc-btn" value='&#177;'><span>&#177;</span></button>
          <button class="calc-btn" value='0'>0</button>
          <button class="calc-btn" value='&#8729;'><span>&#8729;</span></button>
          <button class="calc-btn colorful" value='&#43;'><span>&#43;</span></button>
        </section>
      </section>

      <aside class="calc-child3">
        <p>1255.33</p>
      </aside>
    </main>
  </main>

  <script src="./js/script.js"></script>
</body>

</html>
