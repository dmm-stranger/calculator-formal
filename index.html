<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="./files/logo-icon.png">
  <link rel="stylesheet" href="./css/style.css">
  <title>Formal Calculator</title>
</head>

<body>
  <main class="body-parent">
    <main class="calc-parent">
      <section class="calc-child1">
        <p>Calculator</p>
      </section>

      <section class="calc-child2">
        <section class="calc-child2-sub1">calculator input area</section>
        <section class="calc-child2-sub2">
          <button class="calc-btn">1</button>
          <button class="calc-btn">2</button>
          <button class="calc-btn">3</button>
          <button class="calc-btn">4</button>
          <button class="calc-btn">5</button>
          <button class="calc-btn">6</button>
          <button class="calc-btn">7</button>
          <button class="calc-btn">8</button>
          <button class="calc-btn">9</button>
          <button class="calc-btn">10</button>
          <button class="calc-btn">11</button>
          <button class="calc-btn">12</button>
          <button class="calc-btn">13</button>
          <button class="calc-btn">14</button>
          <button class="calc-btn many">15</button>
          <button class="calc-btn">16</button>
          <button class="calc-btn">17</button>
          <button class="calc-btn">18</button>
          <button class="calc-btn">19</button>
        </section>
      </section>

      <aside class="calc-child3">
        calculator history
      </aside>
    </main>
  </main>

  <script src="./js/script.js"></script>
</body>

</html>
